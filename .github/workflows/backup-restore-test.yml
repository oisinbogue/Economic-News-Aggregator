name: Backup restore test

# Proves the durable backup is actually restorable, not just uploaded.
# pipeline.yml's own verify step (pipeline/backup_verify.py) only ever
# checks the *live* db before upload -- it can't catch a snapshot that was
# corrupted in transit, or a gzip that doesn't actually unpack. This
# workflow downloads the newest "db-latest" release snapshot onto a fresh
# runner (no actions/cache, no reuse of a possibly-stale local checkout)
# and runs the same integrity_check + row-count checks against it.
#
# Read-only against the release: never uploads, deletes, or otherwise
# touches the snapshot assets, so it can't violate the "never overwritten
# in place" guarantee those assets rely on.
on:
  schedule:
    - cron: "0 5 1 * *"  # first of the month, well clear of pipeline.yml's own cron slots
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write  # only used if pipeline.backup_verify needs to file/reuse an alert issue

jobs:
  restore-test:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download newest snapshot from db-latest release
        run: |
          repo="${{ github.repository }}"
          latest=$(gh api "repos/$repo/releases/tags/db-latest" --jq \
            '[.assets[] | select(.name | startswith("aggregator.db."))] | sort_by(.created_at) | last | .name')
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "No snapshot found on the db-latest release -- nothing to restore-test."
            echo "## Backup restore test" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** FAIL -- no snapshot asset found on db-latest" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Restoring $latest"
          mkdir -p data
          gh release download db-latest --repo "$repo" --pattern "$latest" --output data/aggregator.db.gz --clobber
          gunzip -f data/aggregator.db.gz

      - name: Verify restored snapshot (integrity + row-count checks)
        run: python -m pipeline.backup_verify --repo "${{ github.repository }}"
