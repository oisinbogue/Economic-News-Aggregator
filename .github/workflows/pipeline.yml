name: Incremental pipeline

# Runs several times through the day rather than one overnight batch, so a
# transient failure or a single dead feed only costs a couple of hours of
# freshness instead of a full day (v1 died silently for a whole scheduling
# cycle -- see PROJECT_BRIEF.md section 1).
on:
  schedule:
    - cron: "0 6,9,12,15,18,21 * * *"
  workflow_dispatch: {}

# Never let two runs touch the cached db at once.
concurrency:
  group: pipeline-db
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore article archive from cache
        uses: actions/cache/restore@v4
        with:
          path: data/aggregator.db
          key: aggregator-db-${{ github.run_id }}
          restore-keys: |
            aggregator-db-

      # actions/cache is best-effort (7-day LRU, 10GB/repo cap) -- it can be
      # evicted with no warning. The durable copy of record is a compressed
      # snapshot on the "db-latest" GitHub Release, refreshed at the end of
      # every run (see "Back up article archive" step below). Only fall
      # back to it if the cache didn't have the db at all, so a healthy
      # cache hit isn't needlessly overwritten by a slightly older release.
      - name: Restore article archive from durable backup (cache miss only)
        if: ${{ !hashFiles('data/aggregator.db') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "No cached db found -- trying durable backup from the db-latest release"
          repo="${{ github.repository }}"
          latest=$(gh api "repos/$repo/releases/tags/db-latest" --jq \
            '[.assets[] | select(.name | startswith("aggregator.db."))] | sort_by(.created_at) | last | .name' \
            2>/dev/null || echo null)
          if [ -n "$latest" ] && [ "$latest" != "null" ]; then
            gh release download db-latest --repo "$repo" --pattern "$latest" --output data/aggregator.db.gz --clobber
            gunzip -f data/aggregator.db.gz
            echo "Restored data/aggregator.db from GitHub Release asset $latest"
          else
            echo "No durable backup found either -- starting fresh (first run)"
          fi

      - name: Initialise schema
        run: python -m pipeline.db

      - name: Purge previously-fetched live-blog articles
        run: python -m pipeline.cleanup_live_blogs

      - name: Check whether the feeds table needs seeding
        id: feeds_check
        run: |
          count=$(sqlite3 data/aggregator.db "SELECT COUNT(*) FROM feeds;" 2>/dev/null || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Populate feeds table (first run only)
        if: steps.feeds_check.outputs.count == '0'
        run: python -m pipeline.validate_feeds

      - name: Fetch new articles
        run: python -m pipeline.fetch

      - name: Summarise + translate
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python -m pipeline.summarize

      - name: Extract predictions
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python -m pipeline.predictions

      - name: Tag (country + topics)
        run: python -m pipeline.tag

      - name: Cluster related stories
        run: python -m pipeline.cluster

      - name: Curate daily top 10
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python -m pipeline.curate

      - name: Resolve due predictions
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python -m pipeline.resolve

      - name: Build static site
        run: python -m pipeline.build

      - name: Write exports (CSV, latest.json, feed.xml)
        run: python -m pipeline.export

      - name: Save article archive to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/aggregator.db
          key: aggregator-db-${{ github.run_id }}

      # Durable copy of record -- see the restore step above. Runs even if
      # an earlier step failed, so a mid-run crash still banks whatever
      # progress was made rather than losing it until the next success.
      - name: Back up article archive to GitHub Releases
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f data/aggregator.db ]; then
            echo "No db present -- nothing to back up"
            exit 0
          fi
          gzip -kf data/aggregator.db

          repo="${{ github.repository }}"
          asset_name="aggregator.db.${{ github.run_id }}.gz"
          cp data/aggregator.db.gz "data/$asset_name"

          if ! gh release view db-latest --repo "$repo" >/dev/null 2>&1; then
            gh release create db-latest \
              --repo "$repo" \
              --title "Article archive (automated rolling backup)" \
              --notes "Durable backup of data/aggregator.db -- one gzip snapshot per run, older ones pruned. Not a project release -- see PROJECT_BRIEF.md." \
              --prerelease
          fi

          # Each run uploads its own uniquely-named snapshot instead of
          # overwriting/renaming a shared "aggregator.db.gz" asset. Run #8
          # showed that delete-then-replace (and, on the next attempt,
          # upload-then-rename) can leave the release with zero usable
          # backups if any step in the sequence fails partway through.
          # A uniquely-named upload can only ever add a backup, never
          # destroy an existing good one.
          gh release upload db-latest "data/$asset_name" --repo "$repo" --clobber

          # Best-effort prune: keep only the newest 3 snapshots. Failures
          # here are non-fatal -- a good backup already exists by this point.
          (
            gh api "repos/$repo/releases/tags/db-latest" --jq \
              '[.assets[] | select(.name | startswith("aggregator.db."))] | sort_by(.created_at) | reverse | .[3:] | .[].id' \
              | while read -r id; do gh api -X DELETE "repos/$repo/releases/assets/$id" || true; done
          ) || echo "Prune of old backup snapshots failed -- ignoring, not fatal"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
