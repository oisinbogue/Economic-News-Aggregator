# Central pipeline configuration. All paths are relative to the repo root
# (see pipeline/config.py:resolve_path) so this file works unchanged on a
# laptop checkout and on the GitHub Actions runner.

paths:
  db_file: data/aggregator.db
  feeds_csv: data/feeds.csv
  feeds_validated_csv: data/feeds_validated.csv
  feeds_yaml: config/feeds.yaml
  taxonomy_yaml: config/taxonomy.yaml

run:
  fetch_concurrency: 30
  fetch_timeout_seconds: 15
  max_articles_per_run: 300
  # Cerebras free tier is 5 req/min (pipeline.cerebras throttles to one call
  # every 13s across the whole process). A run can touch up to 4 throttled
  # stages -- summarize (up to 2 calls/article), predictions, curate (1
  # call), resolve -- so these limits are kept modest to keep a single
  # incremental Actions run comfortably under GitHub's job time budget
  # rather than maximising throughput per run; the workflow runs 6x/day
  # (.github/workflows/pipeline.yml) so a smaller per-run cap still clears
  # the backlog within a few hours.
  max_summaries_per_run: 20
  max_predictions_per_run: 10  # pipeline.predictions (extraction) and pipeline.resolve (resolution) both read this
  recovery_check_interval_hours: 24  # brief feature #5: how often an auto-deactivated feed gets one probe retry rather than being permanently dead
  recovery_probes_per_run: 15  # cap on how many inactive feeds get probed in a single run, alongside the active-feed fetch

validate_feeds:
  concurrency: 20
  timeout_seconds: 15

cluster:
  # Only articles fetched within this window are eligible to join/form a
  # cluster -- keeps union-find from linking unrelated stories that happen
  # to reuse the same recurring headline words months apart.
  window_days: 3
  title_shared_words: 3     # union-find edge: title significant-word overlap >= this
  tfidf_cosine_threshold: 0.65  # union-find edge: TF-IDF cosine similarity > this (needs scikit-learn)
  carousel_cap: 5           # brief feature #1: carousel shows up to this many articles per cluster

curate:
  max_candidates: 40  # shortlist size sent to the LLM for top-10 picking, keeps the prompt inside the 8,192-token context
  oversample_count: 20  # ask the LLM to rank this many (not just 10) so the diversity re-pick loop has room to skip over cap-violating picks
  max_per_country: 3   # diversity cap: at most this many of the day's top 10 may share a country tag
  max_per_topic: 3     # diversity cap: at most this many of the day's top 10 may share a dominant topic tag
  repeat_lookback_days: 3  # how many prior days' top 10s to check for already-featured stories (soft dedup signal in the prompt, not a hard exclusion)

llm:
  provider: cerebras
  # Llama 3.3 70B (the brief's original choice) is no longer offered on this
  # account's free tier -- /v1/models returns zai-glm-4.7, gemma-4-31b, and
  # gpt-oss-120b. Using gpt-oss-120b (confirmed with user 2026-07-18);
  # zai-glm-4.7 is being deprecated 2026-08-17.
  model: gpt-oss-120b
  # CEREBRAS_API_KEY is read from the environment (.env locally, GitHub
  # Actions secret in CI) -- never stored here.

predictions:
  # brief feature #8: how long after a prediction's horizon_date we keep
  # checking the archive for resolving coverage before giving up and marking
  # it 'expired' with no verdict, rather than checking forever.
  resolution_grace_days: 21
  max_candidate_articles: 15  # archive search results shown to the LLM when proposing a verdict, keeps the prompt inside context
  context_window_days: 14  # how far back pipeline.resolve looks for same-country/topic coverage to give the LLM background context, beyond the direct outcome-candidate search
  context_articles_limit: 8  # cap on how many background-context articles are added to the resolve prompt, keeps it inside context

site:
  title: Economic News Aggregator
  base_url: "https://oisinbogue.github.io/Economic-News-Aggregator/"
  output_dir: site        # pipeline.build writes the static site here
  archive_window_days: 3  # clusters within this window (of "today") show on the homepage; older ones only appear in the archive
