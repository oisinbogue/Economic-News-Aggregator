# Subject-country gazetteer, used by pipeline.geo.detect_countries to tag
# each article with the country/region it's actually ABOUT -- as opposed to
# feeds.country (config/feeds.yaml), which is where the source outlet is
# based. A Bloomberg (US) piece about the Irish housing market should tag
# country=Ireland, not country=United States; this file is what makes that
# possible.
#
# Bucket names are the exact strings shown as country filter chips on the
# site, so they intentionally match feeds.yaml/feeds.csv's country values --
# one shared vocabulary, even though the two are now derived independently.
#
# Per bucket:
#   places      - country/city/capital names. Matched against spaCy NER
#                 entities (GPE/LOC/ORG), exact match after lowercasing --
#                 NER (not blind substring search) is what lets "US" the
#                 country resolve correctly without also matching the
#                 pronoun "us", and lets multi-word names (e.g. "South
#                 Korea") match as a whole.
#   demonyms    - nationality/adjectival forms (Irish, British, Chinese...).
#                 spaCy tags these NORP; matched the same way as places.
#   institutions - central banks, ministries, and other bodies articles
#                 reference instead of naming the country outright (e.g. "the
#                 Fed" for US, "the Dail" for Ireland). Matched by direct
#                 substring/word-boundary search over the full article text
#                 (pipeline.tag's existing word-boundary-for-single-words,
#                 substring-for-phrases convention) rather than requiring
#                 spaCy to have tagged them as an entity, since acronyms and
#                 less-common institution names are exactly what a small NER
#                 model is prone to miss.
#
# An article that matches nothing in here gets country=International rather
# than falling back to the source feed's country (see pipeline.tag).

countries:
  Ireland:
    places: [ireland, dublin, cork, galway, limerick, waterford, dail eireann, dail, oireachtas]
    demonyms: [irish]
    institutions: [central bank of ireland, esri, revenue commissioners, department of finance, national treasury management agency, ida ireland]

  United Kingdom:
    places: [united kingdom, uk, u.k., britain, great britain, england, scotland, wales, northern ireland, london, manchester, birmingham, edinburgh, glasgow, belfast, liverpool]
    demonyms: [british, english, scottish, welsh]
    institutions: [bank of england, office for budget responsibility, hm treasury, downing street, westminster, ofgem, financial conduct authority, boe]

  Europe (Western):
    places: [germany, france, italy, spain, netherlands, belgium, austria, portugal, switzerland, sweden, norway, denmark, finland, luxembourg, iceland, berlin, paris, rome, madrid, amsterdam, brussels, vienna, lisbon, zurich, stockholm, oslo, copenhagen, helsinki, frankfurt, milan, munich]
    demonyms: [german, french, italian, spanish, dutch, belgian, austrian, portuguese, swiss, swedish, norwegian, danish, finnish, european]
    institutions: [european central bank, european commission, european parliament, european union, eurozone, ecb]

  Europe (Eastern/Central):
    places: [poland, czech republic, czechia, hungary, romania, bulgaria, slovakia, slovenia, croatia, serbia, ukraine, latvia, lithuania, estonia, warsaw, prague, budapest, bucharest, sofia, bratislava, ljubljana, zagreb, belgrade, kyiv, kiev, riga, vilnius, tallinn]
    demonyms: [polish, czech, hungarian, romanian, bulgarian, slovak, slovenian, croatian, serbian, ukrainian, latvian, lithuanian, estonian, baltic]
    institutions: [national bank of poland, czech national bank]

  Russia:
    places: [russia, moscow, saint petersburg, st petersburg]
    demonyms: [russian]
    institutions: [kremlin, rosstat, bank of russia]

  Central Asia:
    places: [kazakhstan, kyrgyzstan, tajikistan, turkmenistan, uzbekistan, almaty, astana, bishkek, dushanbe, ashgabat, tashkent]
